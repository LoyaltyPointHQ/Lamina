{{- if and .Values.secrets .Values.secrets.create -}}
{{- /* Collect inline (string) credentials that need to be generated into a Secret */ -}}
{{- $inlineUsers := dict -}}
{{- if and .Values.config.Authentication .Values.config.Authentication.Users -}}
{{- range $i, $user := .Values.config.Authentication.Users -}}
{{- if or (kindIs "string" $user.AccessKeyId) (kindIs "string" $user.SecretAccessKey) -}}
{{- $_ := set $inlineUsers (printf "%d" $i) $user -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- $hasRedisInline := and .Values.config.Redis .Values.config.Redis.ConnectionString (contains "@" .Values.config.Redis.ConnectionString) -}}
{{- if or (gt (len $inlineUsers) 0) $hasRedisInline }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lamina.fullname" . }}-secrets
  labels:
    {{- include "lamina.labels" . | nindent 4 }}
type: Opaque
data:
  {{- /* Only emit keys for users whose AccessKeyId/SecretAccessKey are inline strings */ -}}
  {{- range $idx, $user := $inlineUsers }}
  {{- if kindIs "string" $user.AccessKeyId }}
  auth-user-{{ $idx }}-access-key: {{ $user.AccessKeyId | b64enc | quote }}
  {{- end }}
  {{- if kindIs "string" $user.SecretAccessKey }}
  auth-user-{{ $idx }}-secret-key: {{ $user.SecretAccessKey | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if $hasRedisInline }}
  redis-connection: {{ .Values.config.Redis.ConnectionString | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
